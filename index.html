<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f7fa">
<title>智能记账</title>
<style>
:root{
  --pri:#5b7fff;--pri-l:#eef1fe;--exp:#e8553d;--exp-l:rgba(232,85,61,0.08);--inc:#1aae5b;--inc-l:rgba(26,174,91,0.08);
  --bg:linear-gradient(135deg,#e8eef5 0%,#f0f3f8 30%,#eef1f7 60%,#f5f6fa 100%);
  --card:rgba(255,255,255,0.72);--card2:rgba(255,255,255,0.55);
  --border:rgba(255,255,255,0.8);--border2:rgba(0,0,0,0.06);
  --text:#1a1a2e;--text2:#6b7a90;--text3:#a0aec0;
  --radius:14px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.05),0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.04);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,system-ui,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

.card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border)}
.card-row{display:flex;gap:10px;margin-bottom:12px}
.card-row>*{flex:1}

.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.header h1{font-size:1.15rem;font-weight:700}
.header-actions{display:flex;gap:8px}
.header-actions .btn-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.04);border:none;cursor:pointer;font-size:1.1rem}

.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;cursor:pointer;color:var(--text2);transition:color 0.15s;font-size:0.65rem;gap:2px;border:none;background:none;position:relative}
.tab-item .tab-icon{font-size:1.3rem;transition:transform 0.15s}
.tab-item.active{color:var(--pri)}
.tab-item.active .tab-icon{transform:scale(1.15)}

.main{padding:12px 16px 80px;min-height:100vh}
.page{display:none}.page.active{display:block}

.summary-top{display:flex;gap:8px;margin-bottom:12px}
.summary-card{flex:1;min-width:0;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);padding:14px 10px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border);overflow:hidden}
.summary-card .s-val{font-size:clamp(1.3rem,5vw,1.7rem);font-weight:900;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.5px}
.summary-card .s-val.exp{color:var(--exp)}.summary-card .s-val.inc{color:var(--inc)}
.summary-card .s-lbl{font-size:0.7rem;color:var(--text2);font-weight:600}
.summary-card.budget-card{background:rgba(91,127,255,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;border-color:rgba(255,255,255,0.3)}
.summary-card.budget-card .s-lbl,.summary-card.budget-card .s-sub{color:rgba(255,255,255,0.75)}
.summary-card .s-sub{font-size:0.65rem;color:var(--text3);margin-top:2px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:24px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.btn-pri{background:var(--pri);color:#fff;box-shadow:0 4px 14px rgba(91,127,255,0.3)}.btn-pri:active{background:#4a6de6;transform:scale(0.98)}
.btn-exp{background:var(--exp);color:#fff}.btn-exp:active{background:#d43d28}
.btn-inc{background:var(--inc);color:#fff}.btn-inc:active{background:#15994a}
.btn-ghost{background:rgba(0,0,0,0.04);color:var(--text2)}.btn-ghost:active{background:rgba(0,0,0,0.08)}
.btn-sm{padding:6px 14px;font-size:0.75rem}
.btn-block{width:100%}

input,select,textarea{width:100%;background:rgba(0,0,0,0.03);border:1px solid var(--border2);color:var(--text);font:inherit;padding:10px 14px;border-radius:var(--radius-sm);outline:none;transition:border 0.15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--pri);background:rgba(255,255,255,0.6)}
textarea{resize:none;min-height:80px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:0.78rem;font-weight:600;margin-bottom:5px;color:var(--text2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.amount-input{text-align:center;font-size:1.8rem;font-weight:700;padding:12px;border:none;background:transparent;letter-spacing:1px}
.amount-input:focus{border:none;background:transparent;box-shadow:none}

.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.cat-item{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:var(--radius-sm);cursor:pointer;border:2px solid transparent;transition:all 0.15s;background:rgba(0,0,0,0.03);font-size:0.68rem;gap:4px}
.cat-item .cat-icon{font-size:1.4rem}
.cat-item.selected{border-color:var(--pri);background:var(--pri-l)}
.cat-type-btn{padding:8px 20px;border-radius:20px;font-weight:600;cursor:pointer;border:none;background:rgba(0,0,0,0.04);color:var(--text2);font-size:0.85rem;transition:all 0.15s}
.cat-type-btn.active.expense{background:var(--exp-l);color:var(--exp)}
.cat-type-btn.active.income{background:var(--inc-l);color:var(--inc)}

.txn-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2)}
.txn-item:last-child{border-bottom:none}
.txn-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-info .txn-cat{font-weight:600;font-size:0.85rem}
.txn-info .txn-meta{font-size:0.7rem;color:var(--text2)}
.txn-amount{font-weight:700;font-size:1rem;white-space:nowrap}
.txn-amount.exp{color:var(--exp)}.txn-amount.inc{color:var(--inc)}

.date-sep{display:flex;align-items:center;gap:10px;margin:16px 0 8px;font-size:0.78rem;color:var(--text2)}
.date-sep::after{content:'';flex:1;height:1px;background:var(--border2)}
.date-sep .date-badge{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.03);padding:4px 12px;border-radius:12px}
.date-sep .date-badge .d-sub{font-size:0.6rem;color:var(--text3)}

.sms-area{background:rgba(0,0,0,0.03);border:2px dashed var(--border2);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:all 0.15s}
.sms-area:active{border-color:var(--pri);background:var(--pri-l)}
.sms-area textarea{background:transparent;border:none;text-align:center;font-size:0.78rem;color:var(--text2);min-height:60px}
.sms-area textarea:focus{background:transparent;box-shadow:none}
.sms-result{background:var(--inc-l);border-radius:var(--radius-sm);padding:12px;margin-top:8px;font-size:0.82rem;display:none}
.sms-result.show{display:block}
.sms-result.error{background:var(--exp-l)}

.chart-wrap{position:relative;height:220px;margin:0 auto}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

.progress-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden;flex:1;min-width:40px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}

.budget-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.budget-item:last-child{border-bottom:none}
.budget-item .budget-info{width:60px;text-align:right;font-size:0.78rem;font-weight:600}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s}
.modal-sheet{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 16px;animation:slideUp 0.25s;border:1px solid rgba(255,255,255,0.8)}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin:0 auto 16px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:1rem}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 24px;border-radius:20px;font-size:0.82rem;font-weight:600;background:rgba(26,26,46,0.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;animation:toastIn 0.3s;white-space:nowrap}
.toast.warn{background:var(--exp)}

.profile-section{margin-bottom:20px}
.profile-section h3{font-size:0.82rem;color:var(--text2);margin-bottom:10px;padding-left:4px}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--border)}
.setting-item .set-arrow{color:var(--text3);font-size:0.9rem}

.month-selector{display:inline-flex;align-items:center;gap:0;margin:0 auto 14px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;padding:4px;border:1px solid var(--border);box-shadow:var(--shadow)}
.month-selector button{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:1rem;color:var(--text2);background:transparent;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.month-selector button:active{background:rgba(0,0,0,0.06);color:var(--pri)}
.month-selector .ms-label{font-weight:700;font-size:0.9rem;min-width:90px;text-align:center;color:var(--text)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <h1 id="headerTitle">💰 智能记账</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="switchTab('record')" title="记账">✏️</button>
  </div>
</div>

<div class="main" id="mainContent"></div>

<div class="tab-bar">
  <button class="tab-item active" data-tab="home">
    <span class="tab-icon">🏠</span>首页
  </button>
  <button class="tab-item" data-tab="record">
    <span class="tab-icon">✏️</span>记账
  </button>
  <button class="tab-item" data-tab="bills">
    <span class="tab-icon">📋</span>账单
  </button>
  <button class="tab-item" data-tab="stats">
    <span class="tab-icon">📊</span>统计
  </button>
  <button class="tab-item" data-tab="profile">
    <span class="tab-icon">⚙️</span>我的
  </button>
</div>

<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script>
// ============================
// DATA ENGINE
// ============================
const STORAGE_KEY = 'smartmoney_data';
let DATA = { transactions:[], accounts:[], categories:[], budgets:[], smsRecords:[] };
let currentMonth = '';
let currentTab = 'home';

const DEFAULT_CATEGORIES = [
  {id:'cat_food',name:'餐饮',icon:'🍽️',type:'expense',color:'#e8553d'},
  {id:'cat_transport',name:'交通',icon:'🚌',type:'expense',color:'#f59e0b'},
  {id:'cat_shopping',name:'购物',icon:'🛒',type:'expense',color:'#ec4899'},
  {id:'cat_online',name:'网购',icon:'📦',type:'expense',color:'#f97316'},
  {id:'cat_gasoline',name:'加油',icon:'⛽',type:'expense',color:'#eab308'},
  {id:'cat_telecom',name:'通信',icon:'📡',type:'expense',color:'#06b6d4'},
  {id:'cat_mortgage',name:'房贷',icon:'🏡',type:'expense',color:'#dc2626'},
  {id:'cat_housing',name:'住房',icon:'🏠',type:'expense',color:'#8b5cf6'},
  {id:'cat_entertain',name:'娱乐',icon:'🎮',type:'expense',color:'#6366f1'},
  {id:'cat_medical',name:'医疗',icon:'💊',type:'expense',color:'#06b6d4'},
  {id:'cat_edu',name:'教育',icon:'📚',type:'expense',color:'#14b8a6'},
  {id:'cat_other_exp',name:'其他',icon:'📌',type:'expense',color:'#64748b'},
  {id:'cat_salary',name:'工资',icon:'💰',type:'income',color:'#1aae5b'},
  {id:'cat_parttime',name:'兼职',icon:'💼',type:'income',color:'#10b981'},
  {id:'cat_invest',name:'理财',icon:'📈',type:'income',color:'#059669'},
  {id:'cat_refund',name:'退款',icon:'↩️',type:'income',color:'#0284c7'},
  {id:'cat_other_inc',name:'其他',icon:'➕',type:'income',color:'#6366f1'},
];
const DEFAULT_ACCOUNTS = [
  {id:'acc_icbc',name:'工商银行',type:'储蓄卡',cardLast4:'8945',bankName:'中国工商银行',color:'#e8553d'},
  {id:'acc_wechat',name:'微信零钱',type:'微信',cardLast4:'',bankName:'',color:'#1aae5b'},
  {id:'acc_alipay',name:'支付宝',type:'支付宝',cardLast4:'',bankName:'',color:'#1677ff'},
  {id:'acc_cash',name:'现金',type:'现金',cardLast4:'',bankName:'',color:'#f59e0b'},
];

function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){ try{DATA=JSON.parse(raw)}catch(e){DATA=null} }
  if(!DATA||!DATA.transactions){ DATA={transactions:[],accounts:JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS)),categories:JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),budgets:[],smsRecords:[]}; saveData(); }
  if(!DATA.categories||!DATA.categories.length) DATA.categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  if(!DATA.accounts||!DATA.accounts.length) DATA.accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
  if(!DATA.budgets) DATA.budgets=[];
  if(!DATA.smsRecords) DATA.smsRecords=[];
  const d=new Date(); currentMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function saveData(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA)); }
function genId(p=''){ return p+Date.now().toString(36)+Math.random().toString(36).substr(2,6); }
function toast(msg,type=''){ const el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2000); }

function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmtMoney(n){ return (n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function dateOnly(d){ return String(d||'').split(' ')[0]; }
function fmtDate(d){ if(!d)return'';const s=dateOnly(d);const dt=new Date(s);return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtTime(d){ if(!d)return'';const p=String(d).split(' ');return p[1]||''; }
function fmtDateFull(d){ const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function getWeekday(d){ return ['日','一','二','三','四','五','六'][new Date(d).getDay()]; }
function getMonth(d){ const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; }

function getWeekExpenses(){
  const today=new Date();
  const dayOfWeek=today.getDay();
  const mondayOffset=dayOfWeek===0?6:dayOfWeek-1;
  const monday=new Date(today);monday.setDate(today.getDate()-mondayOffset);monday.setHours(0,0,0,0);
  const dayNames=['一','二','三','四','五','六','日'];
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const amount=DATA.transactions.filter(t=>t.type==='expense'&&dateOnly(t.date)===ds).reduce((s,t)=>s+t.amount,0);
    days.push({label:dayNames[i],date:ds,amount});
  }
  const total=days.reduce((s,d)=>s+d.amount,0);
  const avg=total/7;

  // Last week comparison
  const lastMon=new Date(monday);lastMon.setDate(monday.getDate()-7);
  let lastTotal=0;
  for(let i=0;i<7;i++){
    const d=new Date(lastMon);d.setDate(lastMon.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    lastTotal+=DATA.transactions.filter(t=>t.type==='expense'&&dateOnly(t.date)===ds).reduce((s,t)=>s+t.amount,0);
  }
  const trend=lastTotal>0?Math.round((total-lastTotal)/lastTotal*100):null;
  const startStr=`${monday.getMonth()+1}/${monday.getDate()}`;
  const endStr=`${new Date(monday.getTime()+6*86400000).getMonth()+1}/${new Date(monday.getTime()+6*86400000).getDate()}`;

  // Last 2 weeks for comparison
  const weekTotals=[];
  for(let w=0;w<3;w++){
    const wMon=new Date(monday);wMon.setDate(monday.getDate()-w*7);
    let wTotal=0;
    for(let i=0;i<7;i++){
      const d=new Date(wMon);d.setDate(wMon.getDate()+i);
      const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      wTotal+=DATA.transactions.filter(t=>t.type==='expense'&&dateOnly(t.date)===ds).reduce((s,t)=>s+t.amount,0);
    }
    const wStart=`${wMon.getMonth()+1}/${wMon.getDate()}`;
    const wEnd=`${new Date(wMon.getTime()+6*86400000).getMonth()+1}/${new Date(wMon.getTime()+6*86400000).getDate()}`;
    weekTotals.push({total:wTotal,range:wStart+'-'+wEnd,label:w===0?'本周':w===1?'上周':'前周'});
  }

  return {days,total,avg,trend,range:startStr+' - '+endStr,weekTotals};
}

// ============================
// MULTI-BANK SMS PARSER
// ============================
// Supported banks: ICBC(95588), CCB(95533), ABC(95599), BOC(95566), CMB(95555),
//   CITIC(95558), BOCOM(95559), SPDB(95528), CIB(95561), CMBC(95568),
//   CEB(95595), PAB(95501), HXB(95577), CGB(95508), PSBC(95580)
function parseBankSms(text){
  if(!text||!text.trim()) return null;
  text=text.trim();

  // Must have card number, amount, and balance indicators
  const hasCard=/尾号\d{4}/.test(text);
  const hasAmount=/[\d,]+\.?\d*\s*元/.test(text);
  const hasBalance=/余额/.test(text);
  if(!hasCard||!hasAmount||!hasBalance){
    return {error:'非银行交易短信，已忽略'};
  }

  let result={cardLast4:'',month:'',day:'',time:'',type:'expense',amount:0,balance:0,merchant:'',raw:text,descStr:'',bank:''};

  // Detect bank from sender info in 【】 or known patterns
  let bc=text.match(/[【\[](.+?)[】\]]/);
  result.bank=bc?bc[1].trim():'';

  // Flexible multi-bank pattern: 尾号XXXX[卡/的储蓄卡/的信用卡/账户] M月D日 HH:MM ... 元 ... 余额 ... 元
  let m=text.match(/尾号(\d{4})(?:卡|的储蓄卡|的信用卡|账户|账号)?[^0-9]*(\d{1,2})月(\d{1,2})日(\d{2}:\d{2})/);
  if(m){
    result.cardLast4=m[1];result.month=m[2];result.day=m[3];result.time=m[4];
  }else{
    // Try looser pattern without time
    m=text.match(/尾号(\d{4})[^0-9]*(\d{1,2})月(\d{1,2})日/);
    if(m){ result.cardLast4=m[1];result.month=m[2];result.day=m[3]; }
    else{ return {error:'无法识别短信格式'}; }
  }

  // Determine type
  if(/收入|退款|退税|工资|转入|到账|入账/.test(text)){
    result.type='income';
  }else if(/支出|消费|取现|扣款|付款|转账支出|快捷支付|汇出/.test(text)){
    result.type='expense';
  }

  // Extract amount: find number right before 元
  let am=text.match(/([\d,]+\.?\d*)\s*元/);
  if(am) result.amount=parseFloat(am[1].replace(/,/g,''));

  // Extract balance
  let bm=text.match(/余额[^\d]*([\d,]+\.?\d*)\s*元/);
  if(bm) result.balance=parseFloat(bm[1].replace(/,/g,''));

  // Extract description from (content) or after transaction type
  let desc='';
  let descM=text.match(/[（(]([^)）]+)[)）]/);
  if(descM){ desc=descM[1].trim(); }
  else{
    let dm2=text.match(/(?:支出|收入|消费|转账支出|快捷支付|取现)\s*(.+?)\s*[\d,]+\.?\d*/);
    if(dm2) desc=dm2[1].trim();
  }
  result.descStr=desc;

  // Parse payment method and merchant from description
  let payMethod='';let realMerchant='';
  if(desc){
    let parts=desc.split(/[-–—]/);
    if(parts.length>=2){
      let first=parts[0].replace(/^(消费|支付|快捷支付|在线支付|银联|网银)\s*/,'');
      payMethod=first.trim();
      realMerchant=parts.slice(1).join('-').replace(/…|\.{3}$/,'').trim();
    }else{
      payMethod=desc.replace(/^(消费|支付|快捷支付|在线支付|银联|网银)\s*/,'').trim();
    }
  }
  // Fallback merchant from 【】 brackets (but not bank names)
  if(!realMerchant&&bc&&!/工商银行|建设银行|农业银行|中国银行|招商银行|中信银行|交通银行|浦发|兴业|民生|光大|平安|华夏|广发|邮政|95588|95533|95599|95566|95555|95558|95559|95528|95561|95568|95595|95501|95577|95508|95580|工银|ICBC/i.test(bc[1])){
    realMerchant=bc[1].trim();
  }
  result.merchant=realMerchant||'';
  result.payMethod=payMethod||'';

  return classifyAndReturn(result,text);
}

function classifyAndReturn(result,text){
  // ICBC card 8945 filter only applies to ICBC
  if(result.cardLast4&&result.cardLast4!=='8945'){
    // Check if this is from ICBC specifically
    if(/工商银行|95588|工银|ICBC/i.test(text)){
      return {error:'仅支持尾号8945的工商银行卡，当前卡尾号'+result.cardLast4};
    }
    // Other banks: allow any card
  }

  // Default account
  result.suggestedAccountId='acc_icbc';
  result.catId='cat_other_exp';
  let pm=result.payMethod||'';
  let mch=result.merchant||'';

  // === INCOME classification ===
  if(result.type==='income'){
    if(/退款|退货|退还/.test(text)) result.catId='cat_refund';
    else if(/工资|奖金|津贴|补贴/.test(text)){ result.catId='cat_salary'; }
    else result.catId='cat_other_inc';
    return buildDate(result);
  }

  // === Payment method -> account ===
  if(/财付通/.test(pm)){ result.suggestedAccountId='acc_wechat'; }
  else if(/支付宝/.test(pm)){ result.suggestedAccountId='acc_alipay'; }
  if(!pm&&/财付通/.test(text)){ result.suggestedAccountId='acc_wechat'; }
  else if(!pm&&/支付宝/.test(text)){ result.suggestedAccountId='acc_alipay'; }

  // === Category from merchant name or full text ===
  let searchStr=(mch+' '+text).toLowerCase();
  if(/石油|石化|中石油|中石化|加油站|燃料|加气/.test(searchStr)){ result.catId='cat_gasoline'; }
  else if(/美团|饿了么|外卖|餐厅|饭店|小吃|奶茶|咖啡|肯德基|麦当劳|星巴克|火锅|烧烤|烘焙|面馆|食堂|快餐|饮品/.test(searchStr)){ result.catId='cat_food'; }
  else if(/抖音|拼多多|京东|淘宝|阿里巴巴|唯品会|苏宁|当当|天猫|网易严选|闲鱼/.test(searchStr)){ result.catId='cat_online'; }
  else if(/滴滴|地铁|公交|高速|停车|高铁|机票|火车|航空|航班|客车/.test(searchStr)){ result.catId='cat_transport'; }
  else if(/天翼|电信|中国电信|移动|联通|话费|通信/.test(searchStr)){ result.catId='cat_telecom'; }
  else if(/超市|商场|便利店|百货|沃尔玛|永辉|大润发|华润|物美|屈臣氏/.test(searchStr)){ result.catId='cat_shopping'; }
  else if(/房租|物业|水电|燃气|暖气|自来水|电力/.test(searchStr)){ result.catId='cat_housing'; }
  else if(/贷款本息|房贷|住房贷款|按揭|还贷|个贷/.test(searchStr)){ result.catId='cat_mortgage'; }
  else if(/电影|游戏|KTV|旅游|酒店|景点|演出|票务|健身|洗浴|按摩/.test(searchStr)){ result.catId='cat_entertain'; }
  else if(/医院|药店|诊所|体检|挂号|药房|医护/.test(searchStr)){ result.catId='cat_medical'; }
  else if(/书店|课程|培训|学费|学校|图书|教材/.test(searchStr)){ result.catId='cat_edu'; }
  else if(/基金|股票|保险|理财/.test(searchStr)){ result.catId='cat_invest'; }

  return buildDate(result);
}

function buildDate(result){
  if(result.month&&result.day){
    const y=new Date().getFullYear();
    let d=`${y}-${String(parseInt(result.month)).padStart(2,'0')}-${String(parseInt(result.day)).padStart(2,'0')}`;
    if(new Date(d)>new Date()) d=`${y-1}-${String(parseInt(result.month)).padStart(2,'0')}-${String(parseInt(result.day)).padStart(2,'0')}`;
    result.date=d+(result.time?' '+result.time:'');
  }else{ result.date=todayStr(); }
  return result;
}

function setRecordType(t){
  recordType=t;recordCatId=DATA.categories.find(c=>c.type===t)?.id||'';renderRecord();
}
function setRecordCat(id){ recordCatId=id;renderRecord(); }

function saveRecord(){
  const amtEl=document.getElementById('recAmount');
  const amt=parseFloat(amtEl?.value);
  if(!amt||amt<=0){ toast('请输入金额','warn');return; }
  const note=document.getElementById('recNote')?.value?.trim()||'';
  const txn={
    id:genId('txn_'),type:recordType,amount:amt,categoryId:recordCatId,accountId:recordAccountId,
    date:recordDate,note,smsId:null,createdAt:new Date().toISOString()
  };
  DATA.transactions.push(txn);
  updateAccountBalance(txn.accountId,txn.type,txn.amount);
  saveData();
  toast('记账成功');
  amtEl.value='';
  document.getElementById('recNote')&&(document.getElementById('recNote').value='');
  amtEl.focus();
}

function updateAccountBalance(accountId,type,amount){
  const acc=DATA.accounts.find(a=>a.id===accountId);
  if(!acc)return;
  if(type==='expense') acc.balance=(acc.balance||0)-amount;
  else acc.balance=(acc.balance||0)+amount;
}

let pendingSmsResult=null;
function parseAndPreview(){
  const input=document.getElementById('smsInput').value.trim();
  if(!input){ toast('请先粘贴短信内容','warn');return; }
  const result=parseBankSms(input);
  const el=document.getElementById('smsResult');
  const btn=document.getElementById('smsConfirmBtn');
  el.className='sms-result show';
  if(result.error){
    el.className='sms-result show error';
    el.innerHTML=`❌ ${result.error}`;
    btn.style.display='none';
    pendingSmsResult=null;
    return;
  }
  if(isSmsDuplicate(input,result.date)){
    el.className='sms-result show error';
    el.innerHTML='⚠️ 此短信已登记过，请勿重复导入';
    btn.style.display='none';
    pendingSmsResult=null;
    return;
  }
  const cat=DATA.categories.find(c=>c.id===result.catId);
  const acc=DATA.accounts.find(a=>a.id===(result.suggestedAccountId||'acc_icbc'))||DATA.accounts[0];
  el.innerHTML=`✅ 解析成功<br>📌 ${result.type==='expense'?'支出':'收入'} <strong>${fmtMoney(result.amount)}元</strong> | ${result.payMethod?'消费类型：'+result.payMethod+' | ':''}${cat?cat.icon+' '+cat.name:'其它'}<br>📅 ${result.date} | 尾号${result.cardLast4||'?'} | 账户：${acc?acc.name:'默认'}<br>${result.merchant?'🏪 消费标签：'+result.merchant+'<br>':''}💰 余额：${result.balance?fmtMoney(result.balance)+'元':'未识别'}`;
  btn.style.display='block';
  pendingSmsResult=result;
}

function confirmSmsRecord(){
  if(!pendingSmsResult) return;
  const r=pendingSmsResult;
  const catId=r.catId||(r.type==='expense'?'cat_other_exp':'cat_other_inc');
  const acc=DATA.accounts.find(a=>a.id===(r.suggestedAccountId||'acc_icbc'))||DATA.accounts[0];
  const txn={
    id:genId('txn_'),type:r.type,amount:r.amount,categoryId:catId,accountId:acc.id,
    date:r.date,merchant:r.merchant||'',payMethod:r.payMethod||'',note:makeSmsNote(r),smsId:genId('sms_'),createdAt:new Date().toISOString()
  };
  DATA.transactions.push(txn);
  updateAccountBalance(acc.id,r.type,r.amount);
  addSmsRecord(r.raw,txn.id,r.date);
  saveData();
  toast('✅ 短信登记成功');
  document.getElementById('smsInput').value='';
  document.getElementById('smsResult').className='sms-result';
  document.getElementById('smsConfirmBtn').style.display='none';
  pendingSmsResult=null;
}

function drawPieChart(canvas,catRank,total){
  if(!canvas)return;
  const c=canvas;c.width=c.parentElement.clientWidth;c.height=220;
  const ctx=c.getContext('2d');
  if(!total){ctx.fillStyle='#b0b8c4';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('暂无数据',c.width/2,c.height/2);return;}
  const cx=c.width/2,cy=c.height/2,r=Math.min(cx,cy)-25;
  let start=-Math.PI/2;
  const colors=['#e8553d','#f59e0b','#ec4899','#8b5cf6','#6366f1','#06b6d4','#14b8a6','#64748b','#ef4444','#84cc16'];
  const legendEl=document.getElementById('pieLegend');
  if(legendEl) legendEl.innerHTML='';

  catRank.slice(0,8).forEach(([catId,amt],i)=>{
    const slice=amt/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+slice);
    ctx.fillStyle=colors[i];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    const mid=start+slice/2;
    const lx=cx+Math.cos(mid)*(r-12);const ly=cy+Math.sin(mid)*(r-12);
    if(slice>0.3){
      ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
      ctx.fillText(Math.round(amt/total*100)+'%',lx,ly+3);
    }
    start+=slice;
    const cat=DATA.categories.find(c=>c.id===catId);
    if(legendEl) legendEl.innerHTML+=`<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${cat?cat.name:'其他'} ${Math.round(amt/total*100)}%</span>`;
  });
  // remaining
  const shownAmt=catRank.slice(0,8).reduce((s,[,a])=>s+a,0);
  if(total-shownAmt>0&&legendEl) legendEl.innerHTML+=`<span class="legend-item"><span class="legend-dot" style="background:#e2e8f0"></span>其他 ${Math.round((total-shownAmt)/total*100)}%</span>`;
}

function drawTrendChart(canvas){
  if(!canvas)return;
  const c=canvas;c.width=c.parentElement.clientWidth;c.height=200;
  const ctx=c.getContext('2d');
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
  const expData=months.map(m=>DATA.transactions.filter(t=>t.type==='expense'&&getMonth(t.date)===m).reduce((s,t)=>s+t.amount,0));
  const incData=months.map(m=>DATA.transactions.filter(t=>t.type==='income'&&getMonth(t.date)===m).reduce((s,t)=>s+t.amount,0));
  const max=Math.max(...expData,...incData,1);
  const padX=50,padT=30,padB=30;
  const chartW=c.width-padX-20,chartH=200-padT-padB;

  // Grid
  ctx.strokeStyle='#e8ecf1';ctx.lineWidth=1;
  for(let i=0;i<4;i++){const y=padT+chartH/3*i;ctx.beginPath();ctx.moveTo(padX,y);ctx.lineTo(c.width-20,y);ctx.stroke();}

  // Bars
  const barW=Math.min(22,chartW/months.length/3);
  months.forEach((m,i)=>{
    const x=padX+(chartW/months.length)*i+(chartW/months.length)/2;
    // Expense bar
    const expH=expData[i]/max*chartH;
    ctx.fillStyle='#e8553d';ctx.fillRect(x-barW-2,padT+chartH-expH,barW,expH);
    // Income bar
    const incH=incData[i]/max*chartH;
    ctx.fillStyle='#1aae5b';ctx.fillRect(x+2,padT+chartH-incH,barW,incH);
    // Label
    ctx.fillStyle='#8b95a5';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(m.substring(5),x,padT+chartH+16);
  });

  // Legend
  ctx.fillStyle='#e8553d';ctx.fillRect(c.width-110,padT,8,8);
  ctx.fillStyle='#1aae5b';ctx.fillRect(c.width-60,padT,8,8);
  ctx.fillStyle='#8b95a5';ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillText('支出',c.width-98,padT+9);ctx.fillText('收入',c.width-48,padT+9);
}

    const amt=parseFloat(document.getElementById('budAmt').value);
    if(!amt||amt<=0){ toast('请输入有效金额','warn');return; }
    const data={
      id:bud?bud.id:genId('bud_'),month:document.getElementById('budMonth').value,
      categoryId:document.getElementById('budCat').value||null,
      amount:amt
    };
    if(bud){ const i=DATA.budgets.findIndex(b=>b.id===id);DATA.budgets[i]=data; }
    else DATA.budgets.push(data);
    saveData();renderProfile();toast(bud?'预算已更新':'预算已设置');
  });
}

// ============================
// CATEGORY MODAL
// ============================
function openCategoryModal(id){
  const cat=id?DATA.categories.find(c=>c.id===id):null;
  const icons='🍽️🚌🛒🏠🎮💊📚📌💰💼📈↩️➕🎁💻📱👗✈️🏥🎓🐱☕️🍺'.split('');
  openBottomSheet(cat?'编辑分类':'添加分类',`
    <div class="form-group"><label>名称 *</label><input id="ctName" value="${cat?cat.name:''}"></div>
    <div class="form-group"><label>图标</label><div style="display:flex;flex-wrap:wrap;gap:6px" id="ctIcons">${icons.map(ic=>`<span style="font-size:1.4rem;padding:4px;cursor:pointer;border-radius:6px;border:2px solid ${cat&&cat.icon===ic?'var(--pri)':'transparent'}" onclick="pickCatIcon('${ic}')">${ic}</span>`).join('')}</div><input type="hidden" id="ctIconVal" value="${cat?cat.icon:'📌'}"></div>
    <div class="form-group"><label>类型</label><select id="ctType"><option value="expense" ${cat&&cat.type==='expense'?'selected':''}>支出</option><option value="income" ${cat&&cat.type==='income'?'selected':''}>收入</option></select></div>
    <div class="form-group"><label>颜色</label><input type="color" id="ctColor" value="${cat?cat.color:'#6366f1'}"></div>
  `,()=>{
    const name=document.getElementById('ctName').value.trim();
    if(!name){ toast('请输入分类名称','warn');return; }
    const data={id:cat?cat.id:genId('cat_'),name,icon:document.getElementById('ctIconVal').value,type:document.getElementById('ctType').value,color:document.getElementById('ctColor').value};
    if(cat){ const i=DATA.categories.findIndex(c=>c.id===id);DATA.categories[i]=data; }
    else DATA.categories.push(data);
    saveData();renderProfile();toast(cat?'分类已更新':'分类已添加');
  });
}
function pickCatIcon(icon){
  document.getElementById('ctIconVal').value=icon;
  document.querySelectorAll('#ctIcons span').forEach(s=>s.style.borderColor=s.textContent===icon?'var(--pri)':'transparent');
}

// ============================
// BOTTOM SHEET MODAL
// ============================
function openBottomSheet(title,bodyHtml,onSave,noBtn){
  const container=document.getElementById('modalContainer');
  container.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeSheet()">
    <div class="modal-sheet"><div class="modal-handle"></div>
    <div class="modal-header"><h3>${title}</h3><button class="btn-icon" onclick="closeSheet()" style="border:none;background:var(--bg);cursor:pointer;font-size:1.2rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center">✕</button></div>
    <div>${bodyHtml}</div>
    ${!noBtn?`<button class="btn btn-pri btn-block" style="margin-top:16px" id="sheetSaveBtn">保存</button>`:''}</div></div>`;
  if(!noBtn) document.getElementById('sheetSaveBtn').onclick=()=>{onSave();closeSheet();};
}
function closeSheet(){ document.getElementById('modalContainer').innerHTML=''; }

// ============================
// DATA IMPORT / EXPORT
// ============================
function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='smartmoney_backup_'+todayStr()+'.json';a.click();
  URL.revokeObjectURL(a.href);toast('数据已导出');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(d.transactions&&d.accounts&&d.categories){
        DATA=d;saveData();
        toast('数据已导入');switchTab('home');
      }else{toast('文件格式不正确','warn');}
    }catch(ex){toast('文件格式不正确','warn');}
  };reader.readAsText(file);
}
function clearAllData(){
  if(!confirm('确定清除全部数据？此操作不可恢复！建议先导出备份。'))return;
  localStorage.removeItem(STORAGE_KEY);
  DATA={transactions:[],accounts:JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS)),categories:JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),budgets:[],smsRecords:[]};
  saveData();switchTab('home');toast('数据已清除');
}

// ============================
// HARMONYOS NATIVE SMS BRIDGE
// ============================
// Called by HarmonyOS WebView when ICBC (95588) SMS is received
let nativeSmsEnabled=false;
// Called by Android SmsReceiver with base64-encoded SMS body (safe transport)
window.onNativeSmsB64=function(b64){
  try{ var decoded=atob(b64); onNativeSmsReceived(decoded); }catch(e){}
};
// Poll native SMS queue every 30s (SharedPreferences bridge)
setInterval(function(){
  try{
    if(window.NativeBridge){
      var json=NativeBridge.pollPendingSms();
      if(json&&json!=='[]'){
        var list=JSON.parse(json);
        list.forEach(function(b){ try{ var d=atob(b); onNativeSmsReceived(d); }catch(e){} });
      }
    }
  }catch(e){}
},30000);
// Called by Android/HarmonyOS native layer when SMS permission result is known
window.onSmsPermissionResult=function(granted){
  nativeSmsEnabled=granted;
  if(granted) toast('📱 短信自动记账已启用');
};
window.onNativeSmsReceived=function(smsText){
  nativeSmsEnabled=true;
  if(!smsText||typeof smsText!=='string') return;
  const result=parseBankSms(smsText);
  if(result&&!result.error&&!isSmsDuplicate(smsText,result.date)){
    const catId=result.catId||(result.type==='expense'?'cat_other_exp':'cat_other_inc');
    const acc=DATA.accounts.find(a=>a.id===(result.suggestedAccountId||'acc_icbc'))||DATA.accounts[0];
    const txn={
      id:genId('txn_'),type:result.type,amount:result.amount,categoryId:catId,
      accountId:acc.id,date:result.date,merchant:result.merchant||'',payMethod:result.payMethod||'',
      note:makeSmsNote(result),
      smsId:genId('sms_'),createdAt:new Date().toISOString()
    };
    DATA.transactions.push(txn);
    updateAccountBalance(acc.id,result.type,result.amount);
    addSmsRecord(smsText,txn.id,result.date);
    saveData();
    // Show in-app toast if available, fallback to console
    try{ toast('📱 自动记账: '+(result.type==='expense'?'支出':'收入')+fmtMoney(result.amount)+'元'); }catch(e){}
    // Update current page if visible
    if(currentTab==='home') renderHome();
    if(currentTab==='bills') refreshBills();
  }
};

// Called by Android native layer to import historical SMS on first install
window.onNativeHistoricalSms=function(smsList){
  if(!smsList||!Array.isArray(smsList)) return;
  // One-time import: only run on first install
  if(localStorage.getItem('sm_hist_imported')) return;
  localStorage.setItem('sm_hist_imported','1');
  let imported=0,skipped=0;
  smsList.forEach(smsText=>{
    const result=parseBankSms(smsText);
    if(result&&!result.error&&!isSmsDuplicate(smsText,result.date)){
      const catId=result.catId||(result.type==='expense'?'cat_other_exp':'cat_other_inc');
      const acc=DATA.accounts.find(a=>a.id===(result.suggestedAccountId||'acc_icbc'))||DATA.accounts[0];
      const txn={
        id:genId('txn_'),type:result.type,amount:result.amount,categoryId:catId,
        accountId:acc.id,date:result.date,
        note:makeSmsNote(result),
        smsId:genId('sms_'),createdAt:new Date().toISOString()
      };
      DATA.transactions.push(txn);
      updateAccountBalance(acc.id,result.type,result.amount);
      addSmsRecord(smsText,txn.id,result.date);
      imported++;
    }else{ skipped++; }
  });
  if(imported>0){
    saveData();
    toast('📥 已导入'+imported+'条历史短信记录'+(skipped>0?'，跳过'+skipped+'条':''));
    if(currentTab==='home') renderHome();
    if(currentTab==='bills') refreshBills();
  }
};

// ============================
// PWA
// ============================
(function setupPWA(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE='smartmoney-v1';
const URLS=['/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'/'}).catch(()=>{});

  // Manifest via blob
  const manifest={name:'智能记账',short_name:'记账',start_url:'.',display:'standalone',background_color:'#f5f7fa',theme_color:'#4f6ef7',icons:[{src:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>',sizes:'any'}]};
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(mBlob);
  document.head.appendChild(link);
})();
